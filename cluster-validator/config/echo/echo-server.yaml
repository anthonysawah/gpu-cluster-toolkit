apiVersion: v1
kind: Namespace
metadata:
  name: validator-echo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-worker-1
  namespace: validator-echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo
      worker: "1"
  template:
    metadata:
      labels:
        app: echo
        worker: "1"
    spec:
      nodeName: gpu-toolkit-worker
      containers:
      - name: echo
        image: mendhak/http-https-echo:latest
        env:
        - name: HTTP_PORT
          value: "8080"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: echo-worker-1
  namespace: validator-echo
spec:
  type: NodePort
  selector:
    app: echo
    worker: "1"
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-worker-2
  namespace: validator-echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo
      worker: "2"
  template:
    metadata:
      labels:
        app: echo
        worker: "2"
    spec:
      nodeName: gpu-toolkit-worker2
      containers:
      - name: echo
        image: mendhak/http-https-echo:latest
        env:
        - name: HTTP_PORT
          value: "8080"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: echo-worker-2
  namespace: validator-echo
spec:
  type: NodePort
  selector:
    app: echo
    worker: "2"
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30082
